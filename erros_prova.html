<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderno de Erros · R1 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#faf8f5;color:#1e293b;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100}
.header-inner{max-width:920px;margin:0 auto;padding:1.2rem 1.5rem 0;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.8rem}
.header-tag{font-size:.68rem;font-weight:700;letter-spacing:.12em;color:#94a3b8;text-transform:uppercase;margin-bottom:.25rem}
.header-title{font-family:'Lora',serif;font-size:clamp(1.2rem,3vw,1.7rem);font-weight:600;color:#1e293b;margin-bottom:.15rem}
.header-sub{font-size:.78rem;color:#94a3b8}
.header-btns{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
nav{max-width:920px;margin:0 auto;padding:0 1.5rem;display:flex;gap:.15rem;margin-top:.8rem}
.nav-btn{background:none;border:none;padding:.55rem 1rem;font-size:.8rem;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;font-family:'Nunito',sans-serif;transition:all .15s}
.nav-btn:hover{color:#475569}
.nav-btn.active{color:#4f46e5;border-bottom-color:#4f46e5}
main{max-width:920px;margin:0 auto;padding:1.8rem 1.5rem 6rem}
.view{display:none}.view.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.8rem;margin-bottom:1.3rem}
.stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.9rem;text-align:center;cursor:pointer;transition:border-color .15s}
.stat-card:hover{border-color:#c7d2fe}
.stat-num{font-family:'Lora',serif;font-size:1.8rem;font-weight:600;line-height:1}
.stat-label{font-size:.68rem;color:#94a3b8;margin-top:.22rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
.dash-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-top:1.1rem}
@media(max-width:600px){.dash-grid,.dash-grid-2{grid-template-columns:1fr}}
.panel{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.15rem 1.3rem}
.panel-title{font-family:'Lora',serif;font-size:.93rem;font-weight:600;color:#1e293b;margin-bottom:.8rem}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem}
.bar-wrap{margin-bottom:.8rem;cursor:pointer}
.bar-row{display:flex;justify-content:space-between;margin-bottom:.28rem}
.bar-name{font-size:.82rem;font-weight:600}
.bar-count{font-size:.75rem;color:#94a3b8}
.bar-bg{background:#f1f5f9;border-radius:99px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s}
.type-row{display:flex;align-items:center;gap:.65rem;margin-bottom:.65rem;padding:.48rem .75rem;background:#faf8f5;border-radius:8px;border:1px solid #e2e8f0;cursor:pointer}
.type-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.type-label{font-size:.81rem;color:#475569;flex:1}
.type-count{font-weight:700;font-size:.95rem}
.prova-item{font-size:.79rem;color:#64748b;padding:.35rem 0;border-bottom:1px solid #f1f5f9}
.mini-card{display:flex;align-items:center;gap:.55rem;padding:.42rem 0;border-bottom:1px solid #f1f5f9}
.mini-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mini-title{font-size:.79rem;font-weight:600;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-sub{font-size:.68rem;color:#94a3b8}
.filter-bar{display:flex;gap:.65rem;margin-bottom:1rem;flex-wrap:wrap}
.filter-bar input,.filter-bar select{background:#faf8f5;border:1px solid #e2e8f0;border-radius:8px;padding:.48rem .8rem;font-size:.81rem;color:#1e293b;font-family:'Nunito',sans-serif;outline:none}
.filter-bar input{flex:1;min-width:150px}
.results-count{font-size:.78rem;color:#94a3b8;margin-bottom:.9rem}

/* NOVOS ESTILOS PARA REVISADO */
.err-card{background:#fff;border-radius:10px;margin-bottom:.75rem;overflow:hidden;border:1px solid #e2e8f0;border-left-width:4px;transition: all 0.2s;}
.err-card.revisado { opacity: 0.65; background: #f8fafc; }
.err-card.revisado .err-title { text-decoration: line-through; color: #94a3b8; }
.check-revisado { width: 18px; height: 18px; cursor: pointer; accent-color: #4f46e5; flex-shrink: 0; margin-top: 2px;}

.err-card-head{padding:.82rem 1.05rem;display:flex;align-items:flex-start;gap:.75rem;cursor:pointer}
.err-card-meta{display:flex;flex-wrap:wrap;gap:.32rem;align-items:center;margin-bottom:.25rem}
.badge{border-radius:5px;font-size:.65rem;font-weight:700;padding:.1rem .45rem;border:1px solid}
.badge-tipo{background:#f8fafc;color:#64748b;border-color:#e2e8f0;font-weight:500}
.badge-prova{font-size:.65rem;color:#94a3b8}
.err-title{font-weight:600;font-size:.88rem;color:#1e293b;font-family:'Lora',serif}
.err-preview{font-size:.76rem;color:#94a3b8;margin-top:.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chevron{color:#cbd5e1;font-size:.7rem;flex-shrink:0;margin-top:.1rem}
.err-body{border-top:1px solid;padding:.82rem 1.05rem;display:none}
.err-body.open{display:block}
.err-text{font-size:.845rem;color:#334155;line-height:1.75;white-space:pre-wrap}
.card-actions{display:flex;gap:.45rem;margin-top:.85rem;justify-content:flex-end}
.res-card{background:#fff;border-radius:10px;margin-bottom:.9rem;overflow:hidden;border:1px solid #e2e8f0;border-left-width:4px}
.res-card-head{padding:.95rem 1.15rem;display:flex;align-items:center;gap:.75rem;cursor:pointer}
.res-body{border-top:1px solid;padding:1.1rem 1.35rem;background:#fdfcfb;display:none}
.res-body.open{display:block}
.res-section-title{font-family:'Lora',serif;font-weight:600;font-size:.93rem;color:#1e293b;margin-bottom:.5rem;padding-bottom:.25rem;border-bottom:1px solid #e2e8f0;margin-top:1.1rem}
.res-section-title:first-child{margin-top:0}
.res-text{font-size:.84rem;color:#334155;line-height:1.75;white-space:pre-wrap;margin-bottom:.45rem}
.res-list{padding-left:1.1rem;margin:.45rem 0}
.res-list li{font-size:.82rem;color:#334155;line-height:1.7;margin-bottom:.2rem}
.res-ol{padding-left:1.3rem;margin:.45rem 0}
.res-ol li{font-size:.82rem;color:#334155;line-height:1.7;margin-bottom:.32rem}
.formula-box{background:#f0f9ff;border:1px solid #bae6fd;border-left:3px solid #0ea5e9;border-radius:0 6px 6px 0;padding:.52rem .95rem;font-family:'Lora',serif;font-size:.86rem;color:#0c4a6e;margin:.45rem 0}
.macete-box{background:#fdf4ff;border:1px solid #e9d5ff;border-radius:8px;padding:.6rem .95rem;font-size:.81rem;color:#6b21a8;margin:.7rem 0}
.alert-box{border-radius:8px;padding:.6rem .95rem;font-size:.81rem;margin:.52rem 0;line-height:1.6}
.alert-red{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.alert-orange{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.alert-blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.alert-verde{background:#f0fdf4;border:1px solid #bbf7d0;color:#14532d}
.alert-purple{background:#fdf4ff;border:1px solid #e9d5ff;color:#6b21a8}
.res-table-wrap{overflow-x:auto;margin:.7rem 0}
.res-table{width:100%;border-collapse:collapse;font-size:.79rem}
.res-table th{background:#f8fafc;color:#64748b;font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.48rem .72rem;text-align:left;border-bottom:1px solid #e2e8f0;white-space:nowrap}
.res-table td{padding:.48rem .72rem;border-bottom:1px solid #f1f5f9;color:#334155;line-height:1.5;vertical-align:top}
.res-table tr:nth-child(even) td{background:#fafafa}
.empty{text-align:center;color:#94a3b8;padding:3rem;font-size:.88rem}
.btn-primary{background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:.52rem 1.1rem;font-size:.8rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap}
.btn-outline{background:#fff;color:#0ea5e9;border:1.5px solid #7dd3fc;border-radius:8px;padding:.5rem 1.1rem;font-size:.8rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap}
.btn-sec{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:8px;padding:.5rem 1rem;font-size:.8rem;font-weight:600;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-link{background:none;border:none;color:#4f46e5;font-size:.77rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-sm{border:none;border-radius:6px;padding:.28rem .7rem;font-size:.73rem;font-weight:600;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-blue-sm{background:#eff6ff;color:#3b82f6}
.btn-red-sm{background:#fee2e2;color:#ef4444}
.btn-grey-sm{background:#f1f5f9;color:#64748b}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.32);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.6rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.13)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.3rem}
.modal-title{font-family:'Lora',serif;font-size:1.05rem;font-weight:600;color:#1e293b}
.close-btn{background:none;border:none;font-size:.95rem;color:#94a3b8;cursor:pointer}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.form-group{display:flex;flex-direction:column}
.form-group.full{grid-column:1/-1}
label.lbl{font-size:.68rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem;display:block}
.form-grid input,.form-grid select,.form-grid textarea{background:#faf8f5;border:1px solid #e2e8f0;border-radius:8px;padding:.48rem .8rem;font-size:.81rem;color:#1e293b;font-family:'Nunito',sans-serif;outline:none;width:100%}
.form-grid textarea{resize:vertical}
.modal-actions{display:flex;gap:.65rem;justify-content:flex-end;margin-top:1.35rem}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:.6rem 1.35rem;border-radius:99px;font-size:.8rem;font-weight:600;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.18);opacity:0;transition:opacity .25s;pointer-events:none}
#toast.show{opacity:1}
.confirm-text{font-size:.75rem;color:#ef4444}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <div class="header-tag">📋 Caderno de Estudos · R1 2026</div>
      <h1 class="header-title">Meus Erros &amp; Resumos</h1>
      <p class="header-sub" id="header-sub">Carregando...</p>
    </div>
    <div class="header-btns">
      <button class="btn-sec" onclick="exportHTML()" title="Baixar HTML com seus dados para subir no GitHub">⬇️ Exportar</button>
      <button class="btn-outline" id="btn-new-resumo" style="display:none" onclick="openResForm()">+ Novo Resumo</button>
      <button class="btn-primary" id="btn-new-erro" onclick="openErrForm()">+ Novo Erro</button>
    </div>
  </div>
  <nav>
    <button class="nav-btn active" onclick="setView('dashboard',this)">📊 Painel</button>
    <button class="nav-btn" onclick="setView('erros',this)">✏️ Erros</button>
    <button class="nav-btn" onclick="setView('resumos',this)">📚 Resumos</button>
  </nav>
</header>
<main>
  <div class="view active" id="view-dashboard">
    <div class="stats-row" id="stats-row"></div>
    <div class="dash-grid">
      <div class="panel" id="panel-materia"></div>
      <div class="panel" id="panel-tipo"></div>
    </div>
    <div class="dash-grid-2">
      <div class="panel"><div class="panel-header"><div class="panel-title">Últimos Erros</div><button class="btn-link" onclick="setView('erros',document.querySelectorAll('.nav-btn')[1])">Ver todos →</button></div><div id="dash-erros"></div></div>
      <div class="panel"><div class="panel-header"><div class="panel-title">Resumos Disponíveis</div><button class="btn-link" onclick="setView('resumos',document.querySelectorAll('.nav-btn')[2])">Ver todos →</button></div><div id="dash-resumos"></div></div>
    </div>
  </div>
  <div class="view" id="view-erros">
    <div class="filter-bar">
      <input type="text" id="search-err" placeholder="🔍 Buscar..." oninput="renderErros()">
      <select id="filter-mat" onchange="renderErros()"><option value="">Todas as matérias</option><option>CLM</option><option>Cirurgia</option><option>GO</option><option>Pediatria</option><option>Preventiva</option><option>Psiquiatria</option><option>Outro</option></select>
      <select id="filter-tipo" onchange="renderErros()"><option value="">Todos os tipos</option><option>Conceito</option><option>Distração</option><option>Nunca vi</option><option>Confusão entre temas</option></select>
      <select id="filter-prova" onchange="renderErros()"><option value="">Todos os simulados</option></select>
      <button class="btn-sec" id="btn-clear-err" style="display:none" onclick="clearErrFilter()">✕ Limpar</button>
    </div>
    <div class="results-count" id="err-count"></div>
    <div id="erros-list"></div>
  </div>
  <div class="view" id="view-resumos">
    <div class="filter-bar">
      <input type="text" id="search-res" placeholder="🔍 Buscar resumo..." oninput="renderResumos()">
      <select id="filter-res-mat" onchange="renderResumos()"><option value="">Todas as matérias</option><option>CLM</option><option>Cirurgia</option><option>GO</option><option>Pediatria</option><option>Preventiva</option><option>Psiquiatria</option><option>Outro</option></select>
      <button class="btn-sec" id="btn-clear-res" style="display:none" onclick="clearResFilter()">✕ Limpar</button>
    </div>
    <div class="results-count" id="res-count"></div>
    <div id="resumos-list"></div>
  </div>
</main>
<div class="overlay" id="modal-err" onclick="if(event.target===this)closeErrForm()">
  <div class="modal">
    <div class="modal-header"><span class="modal-title" id="modal-err-title">Registrar Erro</span><button class="close-btn" onclick="closeErrForm()">✕</button></div>
    <div class="form-grid">
      <div class="form-group"><label class="lbl">Matéria</label><select id="ef-mat"><option>CLM</option><option>Cirurgia</option><option>GO</option><option>Pediatria</option><option>Preventiva</option><option>Psiquiatria</option><option>Outro</option></select></div>
      <div class="form-group"><label class="lbl">Tipo de Erro</label><select id="ef-tipo"><option>Conceito</option><option>Distração</option><option>Nunca vi</option><option>Confusão entre temas</option></select></div>
      <div class="form-group full"><label class="lbl">Tema / Assunto</label><input id="ef-tema" placeholder="Ex: Gasometria / Ânion Gap"></div>
      <div class="form-group full"><label class="lbl">O que errei e o correto</label><textarea id="ef-erro" rows="4" placeholder="Descreva o erro e a resposta correta..."></textarea></div>
      <div class="form-group"><label class="lbl">Prova / Simulado</label><input id="ef-prova" placeholder="Ex: Simulado R1 Abr/26"></div>
      <div class="form-group"><label class="lbl">Data</label><input id="ef-data" type="date"></div>
    </div>
    <div class="modal-actions"><button class="btn-sec" onclick="closeErrForm()">Cancelar</button><button class="btn-primary" onclick="submitErr()">Registrar</button></div>
  </div>
</div>
<div class="overlay" id="modal-res" onclick="if(event.target===this)closeResForm()">
  <div class="modal">
    <div class="modal-header"><span class="modal-title" id="modal-res-title">Novo Resumo</span><button class="close-btn" onclick="closeResForm()">✕</button></div>
    <div class="form-grid">
      <div class="form-group"><label class="lbl">Matéria</label><select id="rf-mat"><option>CLM</option><option>Cirurgia</option><option>GO</option><option>Pediatria</option>
