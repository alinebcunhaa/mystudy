<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalas de Avaliação da Dor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f4f0;--card:#fff;--border:#e5e0da;--ink:#2c2825;--ink-soft:#6b6460;--ink-light:#a09890;
  --ok:#2d7a50;--ok-bg:#eaf5ee;--warn:#8a6000;--warn-bg:#fdf5e0;--danger:#a03030;--danger-bg:#fdecea;
  --uni:#c96a40;--uni-bg:#fdf0ea;--uni-sidebar:#f9e9e1;
  --c-geral:#3a6e99;--c-geral-bg:#eaf2f9;
  --c-neuro:#7a449a;--c-neuro-bg:#f3edfb;
  --c-qv:#2e7a5a;--c-qv-bg:#e8f5f0;
  --c-psico:#8a6200;--c-psico-bg:#fdf5e0;
  --c-esp:#40509a;--c-esp-bg:#ebeef9;
  --sidebar-w:240px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* ── TOP HEADER ── */
.top-header{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:18px 28px 16px;position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:16px;
}
.top-header h1{font-family:'DM Serif Display',serif;font-size:20px;line-height:1}
.top-header h1 em{font-style:italic;color:var(--uni)}
.top-header .sub{font-size:12px;color:var(--ink-light);font-weight:300}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:calc(100vh - 57px)}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--card);border-right:1px solid var(--border);
  position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;
  padding:12px 0 24px;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sb-group-label{
  font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-light);padding:14px 16px 6px;
}
.sb-sub-label{
  font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-light);padding:10px 16px 4px 20px;opacity:.7;
}
.sb-item{
  display:flex;align-items:center;gap:8px;padding:7px 16px;
  cursor:pointer;transition:background .15s;border-radius:0;
  font-size:13px;font-weight:400;color:var(--ink-soft);border:none;background:none;
  width:100%;text-align:left;
}
.sb-item:hover{background:var(--bg)}
.sb-item.active{font-weight:600;color:var(--ink)}
.sb-item.active.uni{background:var(--uni-sidebar);color:var(--uni)}
.sb-item.active.geral{background:var(--c-geral-bg);color:var(--c-geral)}
.sb-item.active.neuro{background:var(--c-neuro-bg);color:var(--c-neuro)}
.sb-item.active.qv{background:var(--c-qv-bg);color:var(--c-qv)}
.sb-item.active.psico{background:var(--c-psico-bg);color:var(--c-psico)}
.sb-item.active.esp{background:var(--c-esp-bg);color:var(--c-esp)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-uni{background:var(--uni)}
.dot-geral{background:var(--c-geral)}
.dot-neuro{background:var(--c-neuro)}
.dot-qv{background:var(--c-qv)}
.dot-psico{background:var(--c-psico)}
.dot-esp{background:var(--c-esp)}
.sb-acronym{font-weight:600;font-size:12px;min-width:54px}
.sb-divider{height:1px;background:var(--border);margin:8px 16px}

/* ── CONTENT ── */
.content{overflow-y:auto;padding:28px}
.panel{display:none;max-width:720px;animation:fadeUp .25s ease}
.panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── CARD ── */
.card{background:var(--card);border-radius:14px;padding:22px 24px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.05)}

/* ── SCALE HERO ── */
.hero{display:flex;gap:16px;align-items:flex-start}
.badge{
  width:56px;height:56px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Serif Display',serif;font-size:13px;font-weight:700;
  text-align:center;line-height:1.2;padding:4px;
}
.badge.uni{background:var(--uni-bg);color:var(--uni)}
.badge.geral{background:var(--c-geral-bg);color:var(--c-geral)}
.badge.neuro{background:var(--c-neuro-bg);color:var(--c-neuro)}
.badge.qv{background:var(--c-qv-bg);color:var(--c-qv)}
.badge.psico{background:var(--c-psico-bg);color:var(--c-psico)}
.badge.esp{background:var(--c-esp-bg);color:var(--c-esp)}
.hero-title{font-family:'DM Serif Display',serif;font-size:20px;line-height:1.2;margin-bottom:3px}
.hero-full{font-size:12px;font-style:italic;color:var(--ink-soft);margin-bottom:8px}
.hero-pop{
  display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;
  border-radius:20px;background:var(--bg);color:var(--ink-soft);margin-bottom:8px;
}
.hero-desc{font-size:13.5px;color:var(--ink-soft);line-height:1.6}

/* ── QUANDO USAR ── */
.quando{border-radius:10px;padding:14px 18px;margin-top:0}
.quando.uni{background:var(--uni-bg);border-left:3px solid var(--uni)}
.quando.geral{background:var(--c-geral-bg);border-left:3px solid var(--c-geral)}
.quando.neuro{background:var(--c-neuro-bg);border-left:3px solid var(--c-neuro)}
.quando.qv{background:var(--c-qv-bg);border-left:3px solid var(--c-qv)}
.quando.psico{background:var(--c-psico-bg);border-left:3px solid var(--c-psico)}
.quando.esp{background:var(--c-esp-bg);border-left:3px solid var(--c-esp)}
.quando h4{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.65;margin-bottom:8px}
.quando ul{list-style:none;display:flex;flex-direction:column;gap:5px}
.quando ul li{font-size:13px;display:flex;gap:7px;line-height:1.5;align-items:flex-start}
.quando ul li::before{content:'→';opacity:.45;flex-shrink:0;margin-top:1px}
.quando ul li.no::before{content:'✕';color:var(--danger);opacity:.6}

/* ── SECTION TITLE ── */
.stitle{
  font-size:10px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;
  color:var(--ink-light);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── STRUCTURE TABLE ── */
.struct{display:flex;flex-direction:column;gap:6px}
.srow{
  display:grid;grid-template-columns:140px 1fr;gap:10px;
  font-size:12.5px;line-height:1.5;padding:8px 12px;
  border-radius:8px;background:var(--bg);
}
.srow-label{font-weight:500;color:var(--ink-soft)}

/* ── SCORING ── */
.score-list{display:flex;flex-direction:column;gap:6px}
.score-row{display:grid;grid-template-columns:110px 1fr;gap:10px;align-items:center}
.score-range{font-size:12px;font-weight:600;text-align:right}
.score-bar-wrap{height:24px;border-radius:7px;background:var(--bg);overflow:hidden}
.score-bar{
  height:100%;border-radius:7px;display:flex;align-items:center;
  padding-left:10px;font-size:11px;font-weight:500;color:#fff;white-space:nowrap;
}
.score-bar.ok{background:var(--ok)}
.score-bar.warn{background:var(--warn)}
.score-bar.danger{background:var(--danger)}
.score-bar.neutral{background:var(--ink-light)}

/* ── METRICS ── */
.metrics{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.chip{font-size:11.5px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);color:var(--ink-soft)}
.chip strong{color:var(--ink)}

/* ── NOTA ── */
.nota{
  background:#fffbf2;border:1px solid #e8d888;border-radius:10px;
  padding:12px 16px;font-size:12.5px;color:var(--ink-soft);line-height:1.6;
}
.nota strong{color:var(--ink)}

/* ── REAPP ── */
.reapp{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:500;color:var(--ink-soft);
  background:var(--bg);border-radius:20px;padding:4px 12px;
}

/* ── LANDING ── */
.landing-title{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:6px}
.landing-title em{font-style:italic;color:var(--uni)}
.landing-sub{font-size:14px;color:var(--ink-soft);margin-bottom:24px}
.landing-section{margin-bottom:28px}
.landing-section-title{
  font-size:11px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;
  color:var(--ink-light);margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.landing-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.grid-card{
  background:var(--card);border-radius:10px;padding:14px 14px;cursor:pointer;
  transition:transform .15s,box-shadow .15s;border:1px solid var(--border);
}
.grid-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.gc-acronym{font-weight:600;font-size:14px;margin-bottom:2px}
.gc-name{font-size:10.5px;color:var(--ink-soft);line-height:1.4}
.gc-pop{font-size:10px;color:var(--ink-light);margin-top:5px}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .app{grid-template-columns:1fr}
  .sidebar{
    position:static;height:auto;overflow-x:auto;overflow-y:hidden;
    display:flex;flex-direction:row;padding:8px 0;
    border-right:none;border-bottom:1px solid var(--border);
  }
  .sb-group-label,.sb-sub-label,.sb-divider{display:none}
  .sb-item{white-space:nowrap;padding:6px 14px;border-radius:20px;margin:0 3px;background:var(--bg);font-size:12px}
  .sb-item.active{background:var(--ink)!important;color:#fff!important}
  .sb-dot{display:none}
  .content{padding:16px}
  .srow{grid-template-columns:1fr;gap:2px}
  .score-row{grid-template-columns:90px 1fr}
  .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}
</style>
</head>
<body>

<header class="top-header">
  <div>
    <h1>Escalas de Avaliação da <em>Dor</em></h1>
    <div class="sub">Guia de uso clínico · Unidimensionais &amp; Multidimensionais</div>
  </div>
</header>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content"></main>
</div>

<script>
// ──────────────────────────────────────────────────────────────────────────────
// DATA
// ──────────────────────────────────────────────────────────────────────────────
const SCALES = [
{id:'eva',cat:'uni',sub:null,acronym:'EVA',name:'Escala Visual Analógica',
 pop:'Adultos e crianças > 7 anos, cognitivamente íntegros',
 desc:'Linha horizontal de 10 cm com extremidades "Sem dor" e "Dor máxima". O paciente indica sua dor com uma marca. Mais sensível a pequenas variações que a escala numérica.',
 struct:[
  {l:'Formato',v:'Linha de 10 cm (ou régua graduada)'},
  {l:'Aplicação',v:'< 1 min, autoaplicável'},
  {l:'Pontuação',v:'Medida em cm a partir do zero'},
 ],
 scoring:[
  {r:'0 – 3',lb:'Dor leve — monitorar',lv:'ok',w:30},
  {r:'4 – 7',lb:'Dor moderada — ajuste analgésico',lv:'warn',w:60},
  {r:'8 – 10',lb:'Emergência de dor — intervenção imediata',lv:'danger',w:100},
 ],
 use:['Monitoramento de dor aguda e crônica em adultos e crianças > 7a','Comparação pré e pós-intervenção analgésica','Pesquisa clínica — maior sensibilidade que EVN','Paciente com capacidade motora preservada para marcar'],
 no:['Idosos com comprometimento cognitivo ou visuoespacial','Pacientes não verbais ou inconscientes','Crianças < 7 anos (preferir FLACC ou Escala de Faces)'],
 note:'Versão horizontal é mais confiável que a vertical. Requer habilidade motora e raciocínio abstrato. Ligeiramente superior à EVN em detectar pequenas variações — útil em pesquisa.',
 reapp:'Reavaliar em até 60 min após intervenção',metrics:[]},

{id:'evn',cat:'uni',sub:null,acronym:'EVN',name:'Escala Visual Numérica',
 pop:'Adultos e crianças > 7 anos',
 desc:'Escala de 0 a 10, onde 0 = sem dor e 10 = pior dor imaginável. Pode ser aplicada verbalmente. A mais utilizada na prática clínica pela facilidade de compreensão e aplicação.',
 struct:[
  {l:'Formato',v:'Números 0–10 (verbal ou escrito)'},
  {l:'Aplicação',v:'< 1 min, pode ser verbal ou por telefone'},
  {l:'Derivação',v:'Escala 0–100 (maior precisão em pesquisa)'},
 ],
 scoring:[
  {r:'0 – 3',lb:'Dor leve — monitorar',lv:'ok',w:30},
  {r:'4 – 7',lb:'Dor moderada — ajuste analgésico necessário',lv:'warn',w:60},
  {r:'8 – 10',lb:'Emergência de dor — intervenção imediata',lv:'danger',w:100},
 ],
 use:['Triagem rápida em PSA e UPA — pode ser verbal','Monitoramento nos sinais vitais em enfermaria','Reavaliação pós-analgesia','Pacientes com dificuldade motora para marcar a EVA'],
 no:['Pacientes com comprometimento cognitivo grave','Crianças pré-verbais sem compreensão numérica'],
 note:'Escala de escolha para uso cotidiano no PSA. EVN ≥ 8 = emergência analgésica. Registrar sempre junto dos outros sinais vitais como 5º sinal vital.',
 reapp:'Reavaliar em até 60 min após intervenção',metrics:[]},

{id:'nips',cat:'uni',sub:null,acronym:'NIPS',name:'Neonatal Infant Pain Scale',
 pop:'Recém-nascidos até 1 mês (a termo e pré-termo ≥ 28 sem IG)',
 desc:'Escala comportamental observacional com 6 indicadores. Avaliada durante 1–2 minutos de observação. Pontuação máxima de 7 pontos.',
 struct:[
  {l:'Expressão facial',v:'Relaxada (0) | Contraída (1)'},
  {l:'Choro',v:'Ausente (0) | Resmungos (1) | Vigoroso (2)'},
  {l:'Respiração',v:'Relaxada (0) | Diferente do basal (1)'},
  {l:'Braços',v:'Relaxados (0) | Fletidos/estendidos (1)'},
  {l:'Pernas',v:'Relaxadas (0) | Fletidas/estendidas (1)'},
  {l:'Estado de consciência',v:'Dormindo/calmo (0) | Desconfortável (1)'},
 ],
 scoring:[
  {r:'0 – 3',lb:'Sem dor ou dor leve',lv:'ok',w:40},
  {r:'≥ 4',lb:'Dor presente — intervenção necessária',lv:'danger',w:100},
 ],
 use:['Procedimentos em UTIN: punção venosa, heel stick, intubação','Avaliação pós-operatória neonatal','Monitoramento contínuo de RN criticamente doentes'],
 no:['Crianças > 1 mês (preferir FLACC)','RN paralisados ou com paralisia facial (comprometem itens comportamentais)'],
 note:'Para prematuros < 32 semanas, considerar o PIPP (Premature Infant Pain Profile), que incorpora idade gestacional e estado comportamental basal. A NIPS é validada a partir de 28 semanas de IG.',
 reapp:'Antes e depois de cada procedimento',metrics:[{l:'Pontuação máxima',v:'7 pts'},{l:'Corte para dor',v:'≥ 4'}]},

{id:'flacc',cat:'uni',sub:null,acronym:'FLACC',name:'Face, Legs, Activity, Cry, Consolability',
 pop:'> 1 mês até 7 anos; r-FLACC para crianças com déficit cognitivo',
 desc:'Escala comportamental com 5 domínios, 0–2 pontos cada, total 0–10. Padrão-ouro para crianças de 2 meses a 7 anos. A versão revisada (r-FLACC) inclui descritores específicos para déficit cognitivo.',
 struct:[
  {l:'Face',v:'0: sem expressão | 1: caretas ocasionais | 2: queixo tremendo, mandíbula cerrada'},
  {l:'Pernas',v:'0: relaxadas | 1: inquietas, tensas | 2: chutando ou esticadas'},
  {l:'Atividade',v:'0: quieta | 1: contorcendo, tensa | 2: arqueada, rígida, movimentos bruscos'},
  {l:'Choro',v:'0: sem choro | 1: gemidos ocasionais | 2: choro contínuo, grito'},
  {l:'Consolabilidade',v:'0: satisfeita | 1: tranquilizada por toque | 2: difícil de consolar'},
 ],
 scoring:[
  {r:'0',lb:'Sem dor / relaxada',lv:'ok',w:10},
  {r:'1 – 3',lb:'Dor leve — conforto e analgesia leve',lv:'ok',w:30},
  {r:'4 – 6',lb:'Dor moderada — analgesia indicada',lv:'warn',w:60},
  {r:'7 – 10',lb:'Dor intensa — intervenção imediata',lv:'danger',w:100},
 ],
 use:['Pós-operatório pediátrico (geral, ortopedia, cardíaca)','UTI pediátrica — pacientes intubados ou não cooperativos','Procedimentos dolorosos em crianças pré-verbais'],
 no:['Neonatos < 1 mês (preferir NIPS)','Crianças > 7a com autorelato preservado (preferir EVN ou Escala de Faces)'],
 note:'Observar 1–5 min antes de pontuar. Em dor intensa, pode não haver choro (esgotamento). Reavaliar 15–30 min após analgesia. r-FLACC é indicada para crianças com PC e outras condições neurológicas.',
 reapp:'15–30 min após intervenção',metrics:[{l:'Máximo',v:'10 pts'}]},

{id:'painad',cat:'uni',sub:null,acronym:'PAINAD',name:'Pain Assessment in Advanced Dementia',
 pop:'Adultos com demência avançada / déficit cognitivo grave; pacientes não verbais',
 desc:'5 domínios observacionais, 0–2 pontos cada, total 0–10. Validada para demência avançada, UTI geriátrica e cuidados paliativos. Também referida como PNAID na literatura brasileira.',
 struct:[
  {l:'Respiração',v:'0: normal | 1: dificuldade ocasional, hiperventilação curta | 2: ruidosa, Cheyne-Stokes'},
  {l:'Vocalização',v:'0: nenhuma | 1: gemido/suspiro ocasional | 2: grito, chama repetidamente'},
  {l:'Expressão facial',v:'0: sorriso/inexpressivo | 1: triste/assustado/preocupado | 2: caretas'},
  {l:'Linguagem corporal',v:'0: relaxado | 1: tenso, inquieto, aflito | 2: rígido, punhos cerrados, agressão'},
  {l:'Consolabilidade',v:'0: sem necessidade | 1: distraído por voz/toque | 2: incapaz de ser consolado'},
 ],
 scoring:[
  {r:'0 – 2',lb:'Sem dor ou dor leve',lv:'ok',w:20},
  {r:'3 – 7',lb:'Dor moderada — intervenção analgésica',lv:'warn',w:70},
  {r:'8 – 10',lb:'Dor intensa — analgesia urgente',lv:'danger',w:100},
 ],
 use:['Pacientes com Alzheimer avançado, demência vascular ou frontotemporal','UTI geriátrica — agitação inexplicada pode ser dor não tratada','Cuidados paliativos — final de vida','Avaliação antes e após mobilização e procedimentos'],
 no:['Pacientes com capacidade de autorelato preservada (preferir EVN)'],
 note:'Observar em repouso E durante mobilização (diferenças podem orientar analgesia preventiva). Agitação isolada sem outros sinais pode ter outras causas (fome, delírio, retenção urinária). Treinamento da equipe melhora confiabilidade.',
 reapp:'Antes e depois de cada procedimento e mobilização',metrics:[{l:'Máximo',v:'10 pts'}]},

{id:'bps',cat:'uni',sub:null,acronym:'BPS',name:'Behavioral Pain Scale',
 pop:'Adultos sedados em VM, inconscientes (UTI adulto)',
 desc:'3 domínios comportamentais, total 3–12. Desenvolvida para UTI adulto. A versão BPS-NI (não intubado) substitui o item de adaptação à VM por vocalização.',
 struct:[
  {l:'Expressão facial',v:'1: relaxada | 2: parcialmente tensa | 3: totalmente tensa | 4: caretas, sulco perilabial, pálpebras ocluídas'},
  {l:'Membros superiores',v:'1: sem movimento | 2: flexão parcial | 3: flexão total/dedos | 4: retração permanente, totalmente contraídos'},
  {l:'Adaptação à VM',v:'1: tolera movimentos | 2: tosse com movimentos | 3: briga com ventilador | 4: incapaz de controlar VM'},
 ],
 scoring:[
  {r:'3 – 5',lb:'Sem dor significativa',lv:'ok',w:30},
  {r:'6 – 11',lb:'Dor presente — ajuste de analgesia/sedação',lv:'warn',w:75},
  {r:'12',lb:'Dor máxima — intervenção imediata',lv:'danger',w:100},
 ],
 use:['UTI adulto: paciente intubado e sedado (trauma, sepse, pós-op)','Titulação de analgesia durante sedação profunda ou superficial','Monitoramento em procedimentos: aspiração, curativo, reposicionamento','BPS-NI para paciente com traqueostomia ou VNI'],
 no:['Pacientes acordados e comunicativos (preferir EVN)','Pacientes com bloqueio neuromuscular (compromete itens comportamentais)'],
 note:'Diretriz SCCM/PADIS 2018 recomenda BPS ou CPOT como padrão na UTI adulto. Avaliar em repouso E durante procedimento para analgesia preventiva. Combinar com RASS para manejo integrado de sedoanalgesia.',
 reapp:'A cada procedimento e a cada 4–8h de rotina',metrics:[{l:'Mínimo',v:'3'},{l:'Máximo',v:'12'},{l:'Corte',v:'≥ 6'}]},

{id:'comfortb',cat:'uni',sub:null,acronym:'Comfort-B',name:'Comfort Behavior Scale',
 pop:'Crianças em ventilação mecânica — UTIP (0–17 anos)',
 desc:'7 variáveis comportamentais avaliadas durante 2 minutos de observação. Usada para avaliar dor e sedação integradas em crianças criticamente doentes em VM. Versão comportamental da Comfort Scale original.',
 struct:[
  {l:'Nível de consciência',v:'1: sono profundo → 5: hiperalerta'},
  {l:'Calma / agitação',v:'1: calmo → 5: amedrondado'},
  {l:'Resposta respiratória (VM)',v:'1: sem tosse → 5: compete com ventilador'},
  {l:'Choro (respir. espontânea)',v:'1: silencioso → 5: gritando'},
  {l:'Movimento físico',v:'1: ausente → 5: vigoroso (tronco e cabeça)'},
  {l:'Tônus muscular',v:'1: totalmente relaxado → 5: rigidez extrema'},
  {l:'Tensão facial',v:'1: músculos relaxados → 5: face contorcida'},
 ],
 scoring:[
  {r:'6 – 10',lb:'Supersedação — ponderar redução',lv:'warn',w:35},

 reapp:'4–8 semanas após tratamento',metrics:[]},
];

// ──────────────────────────────────────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────────────────────────────────────
const COLOR = {uni:'uni',geral:'geral',neuro:'neuro',qv:'qv',psico:'psico',esp:'esp'};
function getColor(scale){
  if(scale.cat==='uni') return 'uni';
  return {geral:'geral',neuro:'neuro',qv:'qv',psico:'psico',esp:'esp'}[scale.sub]||'geral';
}

const SUB_LABELS = {geral:'Gerais',neuro:'Dor Neuropática',qv:'Qualidade de Vida',psico:'Psicológicas',esp:'Doença-Específicas'};

// ──────────────────────────────────────────────────────────────────────────────
// RENDER SIDEBAR
// ──────────────────────────────────────────────────────────────────────────────
function renderSidebar(){
  const sb = document.getElementById('sidebar');
  let html = '';

  // UNIDIMENSIONAIS
  html += '<div class="sb-group-label">Unidimensionais</div>';
  SCALES.filter(s=>s.cat==='uni').forEach(s=>{
    html += `<button class="sb-item uni" data-id="${s.id}" onclick="nav('${s.id}')">
      <span class="sb-dot dot-uni"></span>
      <span class="sb-acronym">${s.acronym}</span>
      <span style="font-size:11px;color:var(--ink-light)">${s.name.split(' ').slice(0,3).join(' ')}</span>
    </button>`;
  });

  html += '<div class="sb-divider"></div>';
  html += '<div class="sb-group-label">Multidimensionais</div>';

  const subs = ['geral','neuro','qv','psico','esp'];
  subs.forEach(sub=>{
    const items = SCALES.filter(s=>s.cat==='multi'&&s.sub===sub);
    if(!items.length) return;
    html += `<div class="sb-sub-label">${SUB_LABELS[sub]}</div>`;
    items.forEach(s=>{
      html += `<button class="sb-item ${sub}" data-id="${s.id}" onclick="nav('${s.id}')">
        <span class="sb-dot dot-${sub}"></span>
        <span class="sb-acronym">${s.acronym}</span>
        <span style="font-size:11px;color:var(--ink-light)">${s.name.split(' ').slice(0,3).join(' ')}</span>
      </button>`;
    });
  });

  sb.innerHTML = html;
}

// ──────────────────────────────────────────────────────────────────────────────
// RENDER PANEL
// ──────────────────────────────────────────────────────────────────────────────
function renderPanel(s){
  const c = getColor(s);
  const catLabel = s.cat==='uni'
    ? 'Escala Unidimensional'
    : `Multidimensional — ${SUB_LABELS[s.sub]}`;

  const structRows = s.struct.map(r=>`
    <div class="srow">
      <span class="srow-label">${r.l}</span>
      <span>${r.v}</span>
    </div>`).join('');

  const scoreRows = s.scoring.map(r=>`
    <div class="score-row">
      <span class="score-range">${r.r}</span>
      <div class="score-bar-wrap">
        <div class="score-bar ${r.lv||'neutral'}" style="width:${r.w||50}%">${r.lb}</div>
      </div>
    </div>`).join('');

  const useItems = s.use.map(u=>`<li>${u}</li>`).join('');
  const noItems  = (s.no||[]).map(u=>`<li class="no">${u}</li>`).join('');

  const metrics = s.metrics.length ? `<div class="metrics">${s.metrics.map(m=>`<div class="chip">${m.l}: <strong>${m.v}</strong></div>`).join('')}</div>` : '';

  const reapp = s.reapp ? `<div style="margin-top:10px"><span class="reapp">↺ Reaplicação: ${s.reapp}</span></div>` : '';

  return `
  <div class="card">
    <div class="hero">
      <div class="badge ${c}">${s.acronym}</div>
      <div>
        <div class="hero-title">${s.name}</div>
        <div class="hero-full">${catLabel}</div>
        <div class="hero-pop">👥 ${s.pop}</div>
        <div class="hero-desc">${s.desc}</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="quando ${c}">
      <h4>Quando usar</h4>
      <ul>${useItems}${noItems}</ul>
    </div>
  </div>

  <div class="card">
    <div class="stitle">Estrutura</div>
    <div class="struct">${structRows}</div>
  </div>

  <div class="card">
    <div class="stitle">Interpretação do Escore</div>
    <div class="score-list">${scoreRows}</div>
    ${metrics}
    ${reapp}
  </div>

  <div class="nota"><strong>⚡ Nota clínica:</strong> ${s.note}</div>
  `;
}

// ──────────────────────────────────────────────────────────────────────────────
// RENDER LANDING
// ──────────────────────────────────────────────────────────────────────────────
function renderLanding(){
  const makeGrid = (list, cls) => list.map(s=>`
    <div class="grid-card" onclick="nav('${s.id}')">
      <div class="gc-acronym" style="color:var(--${cls})">${s.acronym}</div>
      <div class="gc-name">${s.name}</div>
      <div class="gc-pop">${s.pop.split('(')[0].trim()}</div>
    </div>`).join('');

  let html = `
  <div class="landing-title">Avaliação da <em>Dor</em></div>
  <div class="landing-sub">Selecione uma escala na barra lateral ou abaixo · ${SCALES.length} instrumentos</div>

  <div class="landing-section">
    <div class="landing-section-title">Unidimensionais (7)</div>
    <div class="grid">${makeGrid(SCALES.filter(s=>s.cat==='uni'),'uni')}</div>
  </div>`;

  const subs = ['geral','neuro','qv','psico','esp'];
  subs.forEach(sub=>{
    const items = SCALES.filter(s=>s.cat==='multi'&&s.sub===sub);
    if(!items.length) return;
    html += `<div class="landing-section">
      <div class="landing-section-title">Multidimensionais — ${SUB_LABELS[sub]}</div>
      <div class="grid">${makeGrid(items,`c-${sub}`)}</div>
    </div>`;
  });

  return html;
}

// ──────────────────────────────────────────────────────────────────────────────
// NAVIGATION
// ──────────────────────────────────────────────────────────────────────────────
let currentId = null;

function nav(id){
  const content = document.getElementById('content');
  const scale = SCALES.find(s=>s.id===id);
  if(!scale) return;

  // Sidebar highlight
  document.querySelectorAll('.sb-item').forEach(el=>{
    el.classList.remove('active');
    if(el.dataset.id===id) el.classList.add('active');
  });

  // Render or show panel
  let panel = document.getElementById('panel-'+id);
  if(!panel){
    panel = document.createElement('div');
    panel.className = 'panel';
    panel.id = 'panel-'+id;
    panel.innerHTML = renderPanel(scale);
    content.appendChild(panel);
  }

  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  panel.classList.add('active');
  content.scrollTop = 0;
  currentId = id;
}

// ──────────────────────────────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────────────────────────────
renderSidebar();
const landing = document.createElement('div');
landing.className = 'panel active';
landing.id = 'panel-landing';
landing.innerHTML = renderLanding();
document.getElementById('content').appendChild(landing);
</script>
</body>
</html>
