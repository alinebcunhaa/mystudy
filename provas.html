<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizador de Provas — Residência</title>
<style>
  :root{
    --bg:#f4f1ea; --card:#fffefb; --ink:#2e2a24; --muted:#8a8175;
    --line:#e3ddd1; --accent:#9c6b4a; --accent2:#6b7d6a; --done:#7a8b6f;
    --warn:#b5793e; --shadow:0 1px 3px rgba(60,50,40,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.45;padding:16px;max-width:980px;margin:0 auto}
  header{margin-bottom:18px}
  h1{font-size:1.5rem;font-weight:700;letter-spacing:-.3px}
  .sub{color:var(--muted);font-size:.85rem;margin-top:2px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);
    color:var(--ink);padding:7px 13px;border-radius:9px;font-size:.85rem;transition:.15s}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin-bottom:13px;box-shadow:var(--shadow)}
  .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
  .name{font-size:1.12rem;font-weight:700;border:none;background:transparent;color:var(--ink);
    width:auto;flex:1;min-width:140px;padding:2px 0}
  .name:focus{outline:none;border-bottom:1.5px solid var(--accent)}
  .badge{font-size:.7rem;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:11px;margin-top:13px}
  .field label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;
    color:var(--muted);margin-bottom:3px;font-weight:600}
  .field input,.field select{width:100%;border:1px solid var(--line);background:#fff;
    border-radius:8px;padding:7px 9px;font:inherit;font-size:.85rem;color:var(--ink)}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
  .field textarea{width:100%;border:1px solid var(--line);background:#fbf9f4;border-radius:8px;
    padding:9px 11px;font:inherit;font-size:.83rem;color:var(--ink);resize:none;overflow:hidden;
    line-height:1.5;display:block}
  .field textarea:focus{outline:none;border-color:var(--accent);background:#fff}
  .files{margin-top:13px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .file-tag{display:inline-flex;align-items:center;gap:6px;background:#f0ece3;
    border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:.78rem}
  .file-tag a{color:var(--accent);text-decoration:none;font-weight:600}
  .file-tag .x{cursor:pointer;color:var(--muted);font-weight:700}
  .upload-btn{font-size:.78rem;padding:5px 11px}
  .links{margin-top:11px;display:flex;flex-wrap:wrap;gap:8px}
  .link-chip{font-size:.78rem;padding:5px 11px;border-radius:8px;background:#eef0ec;
    border:1px solid var(--line);color:var(--accent2);text-decoration:none;font-weight:600}
  .link-chip:hover{border-color:var(--accent2)}
  .row-actions{display:flex;gap:6px;margin-top:12px}
  .row-actions button{font-size:.75rem;padding:5px 10px}
  .del{color:#a8553f}
  footer{text-align:center;color:var(--muted);font-size:.75rem;margin:24px 0 10px}
  .countdown{font-size:.78rem;font-weight:600}
  .days-soon{color:var(--warn)}
  .days-ok{color:var(--accent2)}
</style>
</head>
<body>
<header>
  <h1>📋 Organizador de Provas — Residência</h1>
  <div class="sub">Datas · valores · editais · provas antigas · Notion — salvo localmente no aparelho</div>
</header>

<div class="toolbar">
  <button class="primary" onclick="addProva()">+ Nova prova</button>
  <button onclick="exportar()">⬇ Backup JSON</button>
  <button onclick="document.getElementById('imp').click()">⬆ Restaurar</button>
  <input type="file" id="imp" accept=".json" style="display:none" onchange="importar(event)">
</div>

<div id="lista"></div>

<footer>Dados ficam só neste navegador. Faça backup JSON regularmente.</footer>

<script>
const KEY='provas_residencia_v1';
const STATUS={
  'pendente':{t:'Inscrição pendente',c:'#b5793e',bg:'#f7ecdf'},
  'inscrito':{t:'Inscrito',c:'#6b7d6a',bg:'#e9efe6'},
  'pago':{t:'Pago',c:'#5a7a6b',bg:'#e3eee8'},
  'realizada':{t:'Realizada',c:'#7a746a',bg:'#ececec'}
};

let provas = carregar();

function carregar(){
  const raw = localStorage.getItem(KEY);
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return seed();
}
function seed(){
  return [
    {id:Date.now()+1,nome:'PUC-Campinas (Hosp. Celso Pierro)',data:'',edital:'outubro (inscr. até nov)',valor:'',status:'pendente',banca:'Própria PUC-Campinas',notion:'',
     notas:'2 fases. Teórica 80–100 questões + análise de currículo. Estilo "rodapé de livro": critérios diagnósticos exatos, pediatria e GO complexas e detalhistas. Provas antigas: portal de ingressos PUC-Campinas / plataformas de questões.',files:[]},
    {id:Date.now()+2,nome:'UNESP — FMB Botucatu',data:'',edital:'set–out (prova ~novembro)',valor:'',status:'pendente',banca:'Própria UNESP',notion:'',
     notas:'2 fases. 1ª (90%): 100 questões, 20 de cada grande área. 2ª (10%): arguição presencial de currículo (valoriza ligas/publicações). Corte anestesia ~72–76. Estilo direto, casos curtos, MUITAS imagens (ECG, lâminas, RX, TC), guidelines de emergência (ATLS/ACLS/sepse). Provas antigas: site FMB/UNESP.',files:[]},
    {id:Date.now()+3,nome:'FMABC (Hosp. Mário Covas)',data:'',edital:'outubro',valor:'',status:'pendente',banca:'Vunesp / oscila SUS-SP (Quadrix) e Avalia (SMS-SBC)',notion:'',
     notas:'Modelo tradicional: 1ª (90%) 100 questões 5 grandes áreas, estilo Vunesp ("qual a conduta mais adequada"). 2ª (10%) arguição de currículo. Corte anestesia ~57–58 ampla. ATENÇÃO: vagas municipais/estaduais migram entre SUS-SP e Avalia. Provas antigas: site Vunesp / Avalia.',files:[]},
    {id:Date.now()+4,nome:'Anextesia / DASA (Hosp. Santa Paula)',data:'',edital:'out–nov',valor:'',status:'pendente',banca:'Terceirizada (ex: Consesp)',notion:'',
     notas:'Seletivo próprio DASA. 1ª fase teórica MUITAS VEZES ONLINE com proctoring. Foco em competências do generalista: enunciados curtos, diagnóstico diferencial e conduta de PS. Depois entrevista/análise de fit cultural. Provas antigas: cadernos de seleções DASA / exames Consesp área médica.',files:[]},
    {id:Date.now()+5,nome:'CET Centro Médico de Campinas (CMC)',data:'metade de dezembro',edital:'outubro',valor:'',status:'pendente',banca:'Própria (Clínica Campinense de Anest.)',notion:'',
     notas:'Seletivo próprio (cetcmc.com.br). 1ª: objetiva 5 grandes áreas, bem direta, forte em condutas clínicas imediatas. 2ª (janeiro): avaliação prático-profissional + arguição de currículo (perfil de adaptabilidade). Provas antigas: fechadas, distribuídas a inscritos / cursinhos SP.',files:[]},
    {id:Date.now()+6,nome:'Einstein (HIAE)',data:'',edital:'agosto (inscr. até set)',valor:'~R$ 770',status:'pendente',banca:'Fundação Vunesp (1ª fase)',notion:'',
     notas:'3 fases. 1ª (50%): 75 questões, 5 alt, direta mas muito atualizada (guidelines recentes, MBE). Corte anestesia ~66. 2ª (40%): prática multimídia/estações (postura, más notícias, decisão sob pressão). 3ª (10%): análise curricular em dezembro. Provas antigas: site Vunesp (concursos encerrados).',files:[]},
    {id:Date.now()+7,nome:'Grajaú / SUS (UNISA - Hosp. Geral Grajaú)',data:'',edital:'out–nov',valor:'',status:'pendente',banca:'Quadrix (megaconcurso SUS-SP)',notion:'',
     notas:'100% pelo SUS-SP. NÃO tem prova própria nem currículo — faz a prova geral e "leiloa" a vaga em janeiro pela classificação. Fase única (100%): 100 questões, 5 alt, enunciados longos, muitas imagens (ECG, TC, RX), casos clínicos extensos. Nota bruta define tudo. Provas antigas: site Quadrix "Residência Médica SUS-SP".',files:[]}
  ];
}
function salvar(){
  try{
    localStorage.setItem(KEY, JSON.stringify(provas));
    return true;
  }catch(e){
    alert('⚠️ Não foi possível salvar: o armazenamento do navegador está cheio.\n\nIsso costuma acontecer ao anexar PDFs grandes. Tente:\n• anexar um arquivo menor (comprima o PDF), ou\n• usar o campo "Link Notion" / colar um link do Google Drive nas Notas em vez de anexar o arquivo.\n\nSeus outros dados continuam salvos.');
    return false;
  }
}

function diasRestantes(data){
  if(!data) return null;
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const alvo=new Date(data+'T00:00:00');
  return Math.round((alvo-hoje)/86400000);
}

function render(){
  const provasOrd=[...provas].sort((a,b)=>{
    if(!a.data) return 1; if(!b.data) return -1;
    return a.data.localeCompare(b.data);
  });
  document.getElementById('lista').innerHTML = provasOrd.map(p=>{
    const s=STATUS[p.status]||STATUS.pendente;
    const d=diasRestantes(p.data);
    let cd='';
    if(d!==null){
      if(d>0) cd=`<span class="countdown ${d<=14?'days-soon':'days-ok'}">⏳ ${d} dia${d>1?'s':''}</span>`;
      else if(d===0) cd=`<span class="countdown days-soon">⏳ Hoje!</span>`;
      else cd=`<span class="countdown" style="color:var(--muted)">Passou</span>`;
    }
    const files=p.files.map(f=>`<span class="file-tag">📎 <a href="${f.data}" download="${f.name}">${f.name}</a><span class="x" onclick="rmFile(${p.id},'${f.id}')">✕</span></span>`).join('');
    const notion=p.notion?`<a class="link-chip" href="${p.notion}" target="_blank">🗒 Notion</a>`:'';
    return `<div class="card">
      <div class="card-head">
        <input class="name" value="${p.nome.replace(/"/g,'&quot;')}" onchange="upd(${p.id},'nome',this.value)">
        <div style="display:flex;gap:8px;align-items:center">${cd}
        <span class="badge" style="color:${s.c};background:${s.bg}">${s.t}</span></div>
      </div>
      <div class="grid">
        <div class="field"><label>Data da prova</label><input type="date" value="${p.data}" onchange="upd(${p.id},'data',this.value)"></div>
        <div class="field"><label>Edital sai em</label><input type="text" placeholder="ex: outubro" value="${p.edital||''}" onchange="upd(${p.id},'edital',this.value)"></div>
        <div class="field"><label>Valor inscrição</label><input type="text" placeholder="R$ 0,00" value="${p.valor}" onchange="upd(${p.id},'valor',this.value)"></div>
        <div class="field"><label>Banca / estilo</label><input type="text" placeholder="ex: Vunesp" value="${p.banca||''}" onchange="upd(${p.id},'banca',this.value)"></div>
        <div class="field"><label>Status</label><select onchange="upd(${p.id},'status',this.value)">
          ${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${p.status===k?'selected':''}>${v.t}</option>`).join('')}
        </select></div>
        <div class="field"><label>Link Notion</label><input type="url" placeholder="https://notion.so/..." value="${p.notion}" onchange="upd(${p.id},'notion',this.value)"></div>
      </div>
      <div class="field" style="margin-top:11px"><label>Notas (corte, formato, onde achar prova antiga)</label>
        <textarea oninput="autoGrow(this)" onchange="upd(${p.id},'notas',this.value)" placeholder="Anote aqui...">${p.notas||''}</textarea></div>
      <div class="links">${notion}</div>
      <div class="files">
        <span style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600">Anexos (edital / prova antiga):</span>
        ${files}
        <button class="upload-btn" onclick="document.getElementById('f${p.id}').click()">+ anexar</button>
        <input type="file" id="f${p.id}" multiple style="display:none" onchange="addFile(${p.id},event)">
      </div>
      <div class="row-actions">
        <button class="del" onclick="del(${p.id})">🗑 Excluir</button>
      </div>
    </div>`;
  }).join('');
  document.querySelectorAll('.field textarea').forEach(autoGrow);
}

function autoGrow(el){ el.style.height='auto'; el.style.height=(el.scrollHeight+2)+'px'; }
function upd(id,campo,val){ const p=provas.find(x=>x.id===id); if(p){p[campo]=val; salvar(); render();} }
function del(id){ if(confirm('Excluir esta prova?')){ provas=provas.filter(x=>x.id!==id); salvar(); render(); } }
function addProva(){ provas.push({id:Date.now(),nome:'Nova prova',data:'',edital:'',valor:'',status:'pendente',banca:'',notion:'',notas:'',files:[]}); salvar(); render(); }

function addFile(id,ev){
  const p=provas.find(x=>x.id===id); if(!p) return;
  const files=[...ev.target.files];
  if(!files.length) return;
  let pend=files.length;
  const novos=[];
  files.forEach(f=>{
    if(f.size > 3*1024*1024){
      alert('⚠️ "'+f.name+'" tem '+(f.size/1048576).toFixed(1)+' MB.\n\nArquivos acima de ~3 MB costumam estourar o armazenamento do navegador. Comprima o PDF ou cole um link do Google Drive nas Notas.');
      if(--pend===0) finalizar();
      return;
    }
    const r=new FileReader();
    r.onload=()=>{
      const fid='fl'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
      novos.push({id:fid,name:f.name,data:r.result});
      if(--pend===0) finalizar();
    };
    r.onerror=()=>{ alert('Erro ao ler "'+f.name+'".'); if(--pend===0) finalizar(); };
    r.readAsDataURL(f);
  });
  function finalizar(){
    if(!novos.length){ ev.target.value=''; return; }
    p.files.push(...novos);
    if(!salvar()){ p.files=p.files.filter(x=>!novos.includes(x)); } // reverte se cota estourou
    render();
    ev.target.value='';
  }
}
function rmFile(id,fid){ const p=provas.find(x=>x.id===id); if(p){p.files=p.files.filter(f=>f.id!==fid); salvar(); render();} }

function exportar(){
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(provas,null,2));
  a.download='provas-residencia-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function importar(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ provas=JSON.parse(r.result); salvar(); render(); alert('Restaurado!'); }catch(e){ alert('Arquivo inválido'); } };
  r.readAsText(f);
}

render();
</script>
</body>
</html>
