<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapas Mentais — MedStudy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root {
    --lavender:#c4b5d4; --lavender-light:#ede8f5; --lavender-soft:#f5f1fb;
    --olive:#a8b89a; --olive-light:#e8edd5;
    --rose:#d4a5a5; --rose-light:#f5e8e8;
    --cream:#faf8f4;
    --clinica:#e8935a; --clinica-bg:#fdf3ea;
    --cirurgia:#6a9e60; --cirurgia-bg:#eaf3e8;
    --preventiva:#4a7fa0; --preventiva-bg:#e5f0f8;
    --gineco:#c26b80; --gineco-bg:#faeaee;
    --pediatria:#7a5fa0; --pediatria-bg:#f0eaf8;
    --text-dark:#2d2d35; --text-mid:#5a5a68; --text-light:#9a9aaa;
    --border:rgba(196,181,212,0.3);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;}

  /* NAV */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:0 48px;height:60px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .nav-left{display:flex;align-items:center;gap:12px;}
  .nav-back{
    display:flex;align-items:center;gap:6px;
    font-size:13px;color:var(--text-mid);
    padding:6px 14px;border-radius:50px;
    border:1px solid var(--border);background:white;
    cursor:pointer;font-family:'DM Sans',sans-serif;
    transition:background 0.15s,color 0.15s;text-decoration:none;
  }
  .nav-back:hover{background:var(--lavender-light);color:var(--text-dark);}
  .nav-logo{
    font-family:'Cormorant Garamond',serif;
    font-size:20px;font-weight:600;color:var(--text-dark);
    display:flex;align-items:center;gap:8px;
  }
  .nav-logo span{color:var(--lavender);font-style:italic;}
  .nav-title{
    font-family:'Cormorant Garamond',serif;
    font-size:18px;font-style:italic;color:var(--rose);
  }

  /* HERO */
  .hero{
    padding:80px 48px 40px;
    display:flex;flex-direction:column;align-items:center;
    text-align:center;
    position:relative;overflow:hidden;
  }
  .hero::before{
    content:'';position:absolute;inset:0;
    background:
      radial-gradient(ellipse 600px 400px at 15% 50%,rgba(196,181,212,0.18) 0%,transparent 65%),
      radial-gradient(ellipse 500px 350px at 85% 50%,rgba(212,165,165,0.14) 0%,transparent 60%);
    pointer-events:none;
  }
  .hero-title{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(36px,5vw,56px);font-weight:300;
    line-height:1.15;color:var(--text-dark);
    position:relative;z-index:1;
    animation:fadeUp 0.5s ease both;
  }
  .hero-title em{font-style:italic;color:var(--rose);}
  .hero-sub{
    font-size:14px;color:var(--text-light);
    margin-top:10px;line-height:1.6;
    position:relative;z-index:1;
    animation:fadeUp 0.5s ease 0.1s both;
  }
  .hero-stats{
    display:flex;align-items:center;gap:20px;
    margin-top:20px;position:relative;z-index:1;
    animation:fadeUp 0.5s ease 0.2s both;
  }
  .stat-item{
    display:flex;flex-direction:column;align-items:center;
    font-size:11px;color:var(--text-light);
    letter-spacing:0.05em;text-transform:uppercase;
  }
  .stat-num{
    font-family:'Cormorant Garamond',serif;
    font-size:28px;font-weight:600;color:var(--text-dark);
    line-height:1;margin-bottom:3px;
  }
  .stat-sep{width:1px;height:36px;background:var(--border);}

  /* AREA PILLS */
  .area-pills{
    display:flex;gap:8px;flex-wrap:wrap;
    justify-content:center;margin-top:24px;
    position:relative;z-index:1;
    animation:fadeUp 0.5s ease 0.25s both;
  }
  .area-pill{
    display:flex;align-items:center;gap:6px;
    padding:7px 16px;border-radius:50px;
    border:1.5px solid transparent;
    font-size:12px;font-weight:500;
    cursor:pointer;font-family:'DM Sans',sans-serif;
    transition:transform 0.18s cubic-bezier(.34,1.56,.64,1),box-shadow 0.18s,opacity 0.15s;
    background:none;
  }
  .area-pill:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,0.1);}
  .area-pill.active{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,0.1);}
  .area-pill.inactive{opacity:0.5;}
  .pill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

  /* TOOLBAR */
  .toolbar{
    padding:0 48px 24px;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  }
  .search-box{
    display:flex;align-items:center;gap:8px;
    background:white;border:1px solid var(--border);
    border-radius:50px;padding:9px 18px;flex:1;max-width:340px;
  }
  .search-box input{
    border:none;background:none;
    font-family:'DM Sans',sans-serif;font-size:13px;
    color:var(--text-dark);outline:none;width:100%;
  }
  .search-box input::placeholder{color:var(--text-light);}
  .toolbar-spacer{flex:1;}
  .btn-add{
    display:flex;align-items:center;gap:6px;
    background:var(--rose-light);border:1.5px solid var(--rose);
    color:var(--gineco);padding:9px 18px;border-radius:50px;
    font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
    cursor:pointer;transition:background 0.2s,transform 0.15s;
  }
  .btn-add:hover{background:var(--rose);color:white;transform:scale(1.02);}
  .btn-export{
    display:flex;align-items:center;gap:6px;
    background:white;border:1px solid var(--border);
    color:var(--text-mid);padding:9px 16px;border-radius:50px;
    font-family:'DM Sans',sans-serif;font-size:12px;
    cursor:pointer;transition:background 0.2s;
  }
  .btn-export:hover{background:var(--olive-light);color:var(--text-dark);}
  .results-count{font-size:12px;color:var(--text-light);}
  .results-count strong{color:var(--text-mid);}

  /* MAIN GRID */
  .main-content{padding:0 48px 80px;}

  .area-section{margin-bottom:40px;}
  .area-header{
    display:flex;align-items:center;gap:12px;
    margin-bottom:20px;padding-bottom:12px;
    border-bottom:1px solid var(--border);
  }
  .area-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
  .area-name{
    font-family:'Cormorant Garamond',serif;
    font-size:22px;font-weight:600;color:var(--text-dark);
  }
  .area-count{
    font-size:11px;color:var(--text-light);
    background:var(--lavender-light);
    padding:3px 12px;border-radius:20px;
  }

  .subarea-block{margin-bottom:24px;}
  .subarea-name{
    font-size:11px;letter-spacing:0.12em;
    text-transform:uppercase;color:var(--text-light);
    margin-bottom:12px;
  }

  /* MAPA CARDS */
  .mapas-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:14px;
  }

  .mapa-card{
    background:white;border:1px solid var(--border);
    border-radius:14px;overflow:hidden;
    cursor:pointer;
    transition:transform 0.22s cubic-bezier(.34,1.56,.64,1),box-shadow 0.22s;
    animation:fadeUp 0.3s ease both;
    position:relative;
  }
  .mapa-card:hover{transform:translateY(-5px);box-shadow:0 12px 28px rgba(0,0,0,0.1);}

  .mapa-thumb{
    width:100%;height:130px;
    position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  .mapa-thumb img{
    width:100%;height:100%;object-fit:cover;
    transition:transform 0.3s ease;
  }
  .mapa-card:hover .mapa-thumb img{transform:scale(1.06);}
  .mapa-thumb-placeholder{
    width:100%;height:100%;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:6px;
  }
  .placeholder-icon{font-size:28px;opacity:0.45;}
  .placeholder-text{font-size:10px;color:var(--text-light);text-align:center;padding:0 8px;}

  /* Hover overlay */
  .mapa-overlay{
    position:absolute;inset:0;
    background:rgba(45,45,53,0);
    display:flex;align-items:center;justify-content:center;
    transition:background 0.2s;
  }
  .mapa-card:hover .mapa-overlay{background:rgba(45,45,53,0.28);}
  .open-btn{
    background:white;color:var(--text-dark);
    border:none;border-radius:50px;
    padding:6px 16px;font-size:11px;
    font-family:'DM Sans',sans-serif;font-weight:500;
    opacity:0;transform:translateY(8px);
    transition:opacity 0.2s,transform 0.2s;
    cursor:pointer;
  }
  .mapa-card:hover .open-btn{opacity:1;transform:translateY(0);}

  /* NEW badge */
  .badge-new{
    position:absolute;top:6px;left:6px;
    background:var(--rose-light);color:var(--gineco);
    font-size:9px;padding:2px 8px;border-radius:20px;font-weight:600;
  }

  .mapa-card-body{padding:10px 12px 12px;}
  .mapa-card-name{
    font-size:12px;font-weight:500;
    color:var(--text-dark);line-height:1.3;
  }
  .mapa-card-sub{font-size:10px;color:var(--text-light);margin-top:3px;}

  /* EDIT BTN */
  .mapa-edit{
    position:absolute;top:6px;right:6px;
    width:26px;height:26px;border-radius:8px;
    border:1px solid rgba(255,255,255,0.8);
    background:rgba(255,255,255,0.85);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;cursor:pointer;
    opacity:0;transition:opacity 0.2s;
  }
  .mapa-card:hover .mapa-edit{opacity:1;}
  .mapa-edit:hover{background:white;}

  /* EMPTY */
  .empty-state{
    text-align:center;padding:60px 0;
  }
  .empty-icon{font-size:48px;opacity:0.3;margin-bottom:12px;}
  .empty-title{
    font-family:'Cormorant Garamond',serif;
    font-size:24px;color:var(--text-mid);margin-bottom:8px;
  }
  .empty-sub{font-size:13px;color:var(--text-light);}

  /* MODAL */
  .overlay{
    display:none;position:fixed;inset:0;
    background:rgba(45,45,53,0.45);backdrop-filter:blur(6px);
    z-index:200;align-items:center;justify-content:center;
  }
  .overlay.active{display:flex;}
  .modal{
    background:white;border-radius:24px;padding:36px;
    width:480px;max-width:95vw;
    animation:modalIn 0.3s cubic-bezier(.34,1.56,.64,1);
    position:relative;max-height:90vh;overflow-y:auto;
  }
  @keyframes modalIn{from{transform:scale(0.88) translateY(20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
  .modal-close{
    position:absolute;top:18px;right:18px;
    width:30px;height:30px;border-radius:50%;
    border:none;background:var(--lavender-light);color:var(--text-mid);
    cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;
    transition:background 0.2s;
  }
  .modal-close:hover{background:var(--lavender);color:white;}
  .modal-title{
    font-family:'Cormorant Garamond',serif;
    font-size:26px;font-weight:600;color:var(--text-dark);margin-bottom:6px;
  }
  .modal-sub{font-size:13px;color:var(--text-light);margin-bottom:24px;}
  .form-group{margin-bottom:16px;}
  .form-label{
    display:block;font-size:11px;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--text-mid);margin-bottom:6px;
  }
  .form-input,.form-select,.form-textarea{
    width:100%;padding:10px 14px;border:1px solid var(--border);
    border-radius:10px;font-family:'DM Sans',sans-serif;
    font-size:13px;color:var(--text-dark);background:var(--cream);
    outline:none;transition:border-color 0.2s;
  }
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--lavender);background:white;}
  .form-textarea{resize:vertical;min-height:70px;}
  .form-hint{font-size:11px;color:var(--text-light);margin-top:5px;line-height:1.5;}
  .link-preview{
    width:100%;height:110px;border-radius:10px;overflow:hidden;
    border:1px solid var(--border);margin-top:8px;
    display:none;align-items:center;justify-content:center;
    background:var(--cream);
  }
  .link-preview.show{display:flex;}
  .link-preview img{width:100%;height:100%;object-fit:cover;}
  .modal-actions{display:flex;gap:10px;margin-top:24px;}
  .btn-primary{
    flex:1;padding:11px;background:var(--lavender);color:white;
    border:none;border-radius:12px;font-family:'DM Sans',sans-serif;
    font-size:13px;cursor:pointer;transition:opacity 0.2s,transform 0.15s;
  }
  .btn-primary:hover{opacity:0.88;transform:scale(1.02);}
  .btn-secondary{
    padding:11px 20px;background:var(--cream);color:var(--text-mid);
    border:1px solid var(--border);border-radius:12px;
    font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;
    transition:background 0.2s;
  }
  .btn-secondary:hover{background:var(--lavender-light);}
  .btn-danger{
    padding:11px 16px;background:var(--rose-light);color:var(--gineco);
    border:1px solid var(--rose);border-radius:12px;
    font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;
    transition:background 0.2s;
  }
  .btn-danger:hover{background:var(--rose);color:white;}

  /* LIGHTBOX */
  .lightbox{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,0.88);backdrop-filter:blur(4px);
    z-index:300;align-items:center;justify-content:center;
    flex-direction:column;gap:16px;
  }
  .lightbox.active{display:flex;}
  .lightbox img{
    max-width:90vw;max-height:82vh;
    border-radius:12px;object-fit:contain;
    animation:modalIn 0.25s ease;
  }
  .lightbox-title{
    color:white;font-family:'Cormorant Garamond',serif;
    font-size:20px;font-style:italic;
  }
  .lightbox-close{
    position:fixed;top:20px;right:24px;
    background:rgba(255,255,255,0.15);
    border:none;color:white;width:40px;height:40px;
    border-radius:50%;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background 0.2s;
  }
  .lightbox-close:hover{background:rgba(255,255,255,0.3);}

  .toast{
    position:fixed;bottom:24px;right:24px;
    background:var(--text-dark);color:white;
    padding:12px 20px;border-radius:12px;font-size:13px;z-index:400;
    transform:translateY(80px);opacity:0;
    transition:all 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .toast.show{transform:translateY(0);opacity:1;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--lavender);border-radius:10px;}

  @media(max-width:700px){
    nav{padding:0 20px;}
    .hero{padding:80px 24px 32px;}
    .toolbar,.main-content{padding-left:20px;padding-right:20px;}
    .mapas-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <a class="nav-back" href="index.html">← Hub</a>
    <div style="width:1px;height:20px;background:var(--border)"></div>
    <div class="nav-title">Mapas Mentais</div>
  </div>
  <div class="nav-logo">
    <svg width="26" height="26" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="15" stroke="#c4b5d4" stroke-width="1.5" fill="white"/>
      <path d="M10 22 L10 10 L16 10 Q20 10 20 14 Q20 17 16 17 L10 17" stroke="#c4b5d4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M16 17 Q21 17 21 21 Q21 22 20 22 L10 22" stroke="#c4b5d4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="23" cy="10" r="2" fill="#d4a5a5"/>
    </svg>
    Med<span>Study</span>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1 class="hero-title">Meus <em>Mapas Mentais</em></h1>
  <p class="hero-sub">Clique em qualquer mapa para abrir a imagem no Drive</p>
  <div class="hero-stats">
    <div class="stat-item"><div class="stat-num" id="statTotal">0</div>mapas</div>
    <div class="stat-sep"></div>
    <div class="stat-item"><div class="stat-num" id="statAreas">5</div>áreas</div>
    <div class="stat-sep"></div>
    <div class="stat-item"><div class="stat-num" id="statPersonal">0</div>adicionados</div>
  </div>
  <!-- AREA PILLS -->
  <div class="area-pills" id="areaPills">
    <button class="area-pill active" style="background:var(--clinica-bg);border-color:var(--clinica);color:var(--clinica);" onclick="filterArea('Clínica Médica',this)"><div class="pill-dot" style="background:var(--clinica)"></div>Clínica Médica</button>
    <button class="area-pill" style="background:var(--cirurgia-bg);border-color:var(--cirurgia);color:var(--cirurgia);" onclick="filterArea('Cirurgia',this)"><div class="pill-dot" style="background:var(--cirurgia)"></div>Cirurgia</button>
    <button class="area-pill" style="background:var(--preventiva-bg);border-color:var(--preventiva);color:var(--preventiva);" onclick="filterArea('Preventiva',this)"><div class="pill-dot" style="background:var(--preventiva)"></div>Preventiva</button>
    <button class="area-pill" style="background:var(--gineco-bg);border-color:var(--gineco);color:var(--gineco);" onclick="filterArea('GO',this)"><div class="pill-dot" style="background:var(--gineco)"></div>GO</button>
    <button class="area-pill" style="background:var(--pediatria-bg);border-color:var(--pediatria);color:var(--pediatria);" onclick="filterArea('Pediatria',this)"><div class="pill-dot" style="background:var(--pediatria)"></div>Pediatria</button>
    <button class="area-pill" style="background:#f5e8e8;border-color:#d4a5a5;color:var(--gineco);" onclick="filterArea('Meus',this)"><div class="pill-dot" style="background:#d4a5a5"></div>Meus adds ✦</button>
    <button class="area-pill" style="background:var(--lavender-light);border-color:var(--lavender);color:#7a5fa0;" onclick="filterArea('all',this)"><div class="pill-dot" style="background:var(--lavender)"></div>Todos</button>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-box">
    <span style="color:var(--text-light);font-size:13px">🔍</span>
    <input type="text" placeholder="Buscar mapa..." id="searchInput" oninput="render()">
  </div>
  <div class="toolbar-spacer"></div>
  <div class="results-count" id="resultsCount"></div>
  <button class="btn-export" onclick="exportPersonal()">💾 Exportar</button>
  <button class="btn-export" onclick="document.getElementById('importInput').click()">📂 Importar</button>
  <button class="btn-add" onclick="openModal(null)">＋ Adicionar mapa</button>
  <input type="file" id="importInput" accept=".json" style="display:none" onchange="importPersonal(event)">
</div>

<!-- CONTENT -->
<div class="main-content" id="mainContent"></div>

<!-- MODAL -->
<div class="overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">Adicionar Mapa Mental</div>
    <div class="modal-sub">Cole o link e preencha as informações</div>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label class="form-label">Nome do mapa</label>
      <input type="text" class="form-input" id="fNome" placeholder="Ex: Ciclo Cardíaco">
    </div>
    <div class="form-group">
      <label class="form-label">Área</label>
      <select class="form-select" id="fArea">
        <option value="Clínica Médica">Clínica Médica</option>
        <option value="Cirurgia">Cirurgia</option>
        <option value="Preventiva">Preventiva</option>
        <option value="GO">GO</option>
        <option value="Pediatria">Pediatria</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Subárea</label>
      <input type="text" class="form-input" id="fSubarea" placeholder="Ex: Cardiologia">
    </div>
    <div class="form-group">
      <label class="form-label">Link (Google Drive / OneDrive)</label>
      <input type="text" class="form-input" id="fLink" placeholder="https://drive.google.com/..." oninput="previewLink()">
      <div class="form-hint">✅ Google Drive · OneDrive · link direto de imagem</div>
      <div class="link-preview" id="linkPreview">
        <img id="previewImg" src="" alt="preview" onerror="this.parentElement.classList.remove('show')">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Anotações (opcional)</label>
      <textarea class="form-textarea" id="fNota" placeholder="Observações..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" id="btnDel" onclick="deletePersonal()" style="display:none">🗑 Excluir</button>
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>

</div>

    {id:'d38',area:'Cirurgia',subarea:'Abdome',nome:'Abdome Agudo',link:'https://drive.google.com/file/d/1UB5-YNTbfjLAbIL3-5PDCoPkXy4gbn-F/view'},
    {id:'d39',area:'Cirurgia',subarea:'TGI',nome:'Sd. Disfágica e Dispéptica',link:'https://drive.google.com/file/d/12nMs6XtrDSBnhVOSbCdayaKwl24C_0o1/view'},
    {id:'d40',area:'Cirurgia',subarea:'TGI',nome:'Disfagia e Dispepsia',link:'https://drive.google.com/file/d/1kzTaZUXwTc9l_b5Nq1gweCHLKuNWH-81/view'},
    {id:'d41',area:'Cirurgia',subarea:'TGI',nome:'Mapa Mental TGI',link:'https://drive.google.com/file/d/1r6FeBiVLdP9BeGS3ncTp0PP_dRIFFaiX/view'},
    {id:'d42',area:'Cirurgia',subarea:'TGI',nome:'Tumores TGI',link:'https://drive.google.com/file/d/19FF9cILJYAMaHXWe5BPa3tpuW6TVtm6E/view'},
    {id:'d43',area:'Cirurgia',subarea:'Oncologia',nome:'Tumores Estômago e Esôfago (1)',link:'https://drive.google.com/file/d/1uOfkiS2nZi4MK5WwSHyFxZUmkMgHuNxa/view'},
    {id:'d44',area:'Cirurgia',subarea:'Oncologia',nome:'CA Gástrico',link:'https://drive.google.com/file/d/1QH-mCszhDSoA35YJAUSq74xQdgfkOKwx/view'},
    {id:'d45',area:'Cirurgia',subarea:'Oncologia',nome:'Tumores Hepáticos',link:'https://drive.google.com/file/d/1xpNDRfEV8RD5IPW2pNociFiQwQSb_6KP/view'},
    {id:'d46',area:'Cirurgia',subarea:'Oncologia',nome:'Tumor Pancreático',link:'https://drive.google.com/file/d/1PgNLdWr2wSE7HNjim7D0vjKjWBPGgcy5/view'},
    {id:'d47',area:'Cirurgia',subarea:'Oncologia',nome:'CA Colorretal',link:'https://drive.google.com/file/d/1Z6Gy4L3e2T2nXIghZW3A8K2rN_7XI2ol/view'},
    {id:'d48',area:'Cirurgia',subarea:'Oncologia',nome:'Check-list Pólipos Colorretais',link:'https://drive.google.com/file/d/1265Z9iJLQ5wZgzYKubAtqo4m9sKjZrkc/view'},
    {id:'d49',area:'Cirurgia',subarea:'Técnica Cirúrgica',nome:'Técnica Cirúrgica (1)',link:'https://drive.google.com/file/d/1qwF9cGyNN7FA8C9yzf8BJ5sWJj7vl3fr/view'},
    {id:'d50',area:'Preventiva',subarea:'SUS',nome:'Financiamento do SUS (1)',link:'https://drive.google.com/file/d/1qyR3Z47qC2iOuwHoAU070H1TvodrsyDp/view'},
    {id:'d51',area:'Preventiva',subarea:'SUS',nome:'Financiamento do SUS (2)',link:'https://drive.google.com/file/d/1K89PaYR8gE0Sr9sa-4E2tlZZDjMJwHmx/view'},
    {id:'d53',area:'Preventiva',subarea:'SUS',nome:'Evolução do SUS',link:'https://drive.google.com/file/d/12DCJPvI4CGydoylueH7SnBoPKupc120x/view'},
    {id:'d54',area:'Preventiva',subarea:'SUS',nome:'Aspectos Históricos do SUS (1)',link:'https://drive.google.com/file/d/1nC3HVGsJj-u1CdrFNtJkDnPIndzIU9J3/view'},
    {id:'d55',area:'Preventiva',subarea:'SUS',nome:'Aspectos Históricos do SUS (2)',link:'https://drive.google.com/file/d/1l8QlrVBNR31ZWVgx6yHuUxdP4B4jcB48/view'},
    {id:'d56',area:'Preventiva',subarea:'SUS',nome:'Princípios Básicos do SUS',link:'https://drive.google.com/file/d/1Rz5lsPGhArJN11hGfUwUg73xNiA4U0gE/view'},
    {id:'d57',area:'Preventiva',subarea:'SUS',nome:'Revisão — SUS e Suas Bases (1)',link:'https://drive.google.com/file/d/1jILfg31ZZ8MjiLr9-UCjQ1FnLX3JOW_q/view'},
    {id:'d59',area:'GO',subarea:'Ginecologia',nome:'Ciclo Menstrual',link:'https://drive.google.com/file/d/1KUNcB_jLKNoYhmcz8vty8syR31FnjS1m/view'},
    {id:'d60',area:'GO',subarea:'Ginecologia',nome:'Gráfico Fluxo Menstrual (1)',link:'https://drive.google.com/file/d/1LBNLaTDwk8TuYm6NdQO3vymz9-OQZjTT/view'},
    {id:'d61',area:'GO',subarea:'Anatomia',nome:'Anatomia Pélvica',link:'https://drive.google.com/file/d/1Ta65GLWg0p2YLxUAEhJGbgjTzmuM7DzR/view'},
  ];

  const AREA_COLORS={
    'Clínica Médica':{dot:'#e8935a',bg:'#fdf3ea'},
    'Cirurgia':{dot:'#6a9e60',bg:'#eaf3e8'},
    'Preventiva':{dot:'#4a7fa0',bg:'#e5f0f8'},
    'GO':{dot:'#c26b80',bg:'#faeaee'},
    'Pediatria':{dot:'#7a5fa0',bg:'#f0eaf8'},
  };

  const PERSONAL_KEY='medstudy_mapas_personal';
  let currentFilter='all';
  let currentEditId=null;

  function loadPersonal(){try{return JSON.parse(localStorage.getItem(PERSONAL_KEY))||[];}catch{return[];}}
  function savePersonal(arr){localStorage.setItem(PERSONAL_KEY,JSON.stringify(arr));}

  function getThumb(link){
    if(!link)return null;
    const m=link.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if(m)return`https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`;
    const m2=link.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if(m2&&link.includes('drive.google.com'))return`https://drive.google.com/thumbnail?id=${m2[1]}&sz=w400`;
    if(/\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(link))return link;
    return null;
  }

  function allMapas(){
    return[...DEFAULT_MAPAS,...loadPersonal().map(m=>({...m,isPersonal:true}))];
  }

  function filterArea(area,btn){
    currentFilter=area;
    document.querySelectorAll('.area-pill').forEach(p=>{
      p.classList.toggle('active',p===btn);
      p.classList.toggle('inactive',p!==btn&&area!=='all');
    });
    if(area==='all')document.querySelectorAll('.area-pill').forEach(p=>p.classList.remove('inactive'));
    render();
  }

  function render(){
    const query=document.getElementById('searchInput').value.toLowerCase();
    const personal=loadPersonal();
    const content=document.getElementById('mainContent');

    let all=allMapas();

    if(currentFilter==='Meus')all=all.filter(m=>m.isPersonal);
    else if(currentFilter!=='all')all=all.filter(m=>m.area===currentFilter);
    if(query)all=all.filter(m=>m.nome.toLowerCase().includes(query)||(m.subarea||'').toLowerCase().includes(query));

    // Stats
    document.getElementById('statTotal').textContent=allMapas().length;
    document.getElementById('statPersonal').textContent=personal.length;
    document.getElementById('resultsCount').innerHTML=`<strong>${all.length}</strong> mapa${all.length!==1?'s':''}`;

    if(!all.length){
      content.innerHTML=`<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-title">Nenhum mapa encontrado</div><div class="empty-sub">Tente outro filtro ou termo de busca</div></div>`;
      return;
    }

    // Group by area → subarea
    const grouped={};
    all.forEach(m=>{
      if(!grouped[m.area])grouped[m.area]={};
      const sub=m.subarea||'Geral';
      if(!grouped[m.area][sub])grouped[m.area][sub]=[];
      grouped[m.area][sub].push(m);
    });

    const order=['Clínica Médica','Cirurgia','Preventiva','GO','Pediatria'];
    let html='';

    order.forEach(area=>{
      if(!grouped[area])return;
      const ac=AREA_COLORS[area]||{dot:'#b0a898',bg:'#f5f3f0'};
      const total=Object.values(grouped[area]).flat().length;
      html+=`<div class="area-section">
        <div class="area-header">
          <div class="area-dot" style="background:${ac.dot}"></div>
          <div class="area-name">${area}</div>
          <span class="area-count">${total}</span>
        </div>`;

      Object.keys(grouped[area]).forEach(sub=>{
        const items=grouped[area][sub];
        html+=`<div class="subarea-block">
          <div class="subarea-name">${sub}</div>
          <div class="mapas-grid">`;

        items.forEach((m,i)=>{
          const thumb=getThumb(m.link||'');
          const safe=(m.link||'').replace(/'/g,"\\'");
          const safeNome=m.nome.replace(/'/g,"\\'");
          const isPersonal=!!m.isPersonal;

          html+=`<div class="mapa-card" style="animation-delay:${i*0.04}s">
            <div class="mapa-thumb">
              ${thumb
                ?`<img src="${thumb}" alt="${m.nome}" onclick="openLightbox('${thumb}','${safeNome}')" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                :''}
              <div class="mapa-thumb-placeholder" style="background:${ac.bg};${thumb?'display:none':''}">
                <div class="placeholder-icon">🗺️</div>
                <div class="placeholder-text">${m.link?'Clique para abrir':'Sem link'}</div>
              </div>
              <div class="mapa-overlay" onclick="${m.link?`openLink('${safe}')`:``}">
                <button class="open-btn">${m.link?'Abrir ↗':'Sem link'}</button>
              </div>
              ${isPersonal?`<button class="mapa-edit" onclick="event.stopPropagation();openModal('${m.id}')">✏️</button>`:`<button class="mapa-edit" title="Fixo — não editável" style="cursor:default">📌</button>`}
              ${isPersonal?`<span class="badge-new">✦ meu</span>`:''}
            </div>
            <div class="mapa-card-body">
              <div class="mapa-card-name">${m.nome}</div>
              ${m.nota?`<div class="mapa-card-sub">${m.nota}</div>`:''}
            </div>
          </div>`;
        });

        html+=`</div></div>`;
      });
      html+=`</div>`;
    });

    // Meus adds sem área no order
    if(grouped['outros']){
      // skip for now
    }

    content.innerHTML=html;
  }

  function openLink(url){window.open(url,'_blank');}

  function openLightbox(thumb,nome){
    document.getElementById('lightboxImg').src=thumb;
    document.getElementById('lightboxTitle').textContent=nome;
    document.getElementById('lightbox').classList.add('active');
  }
  function closeLightbox(){document.getElementById('lightbox').classList.remove('active');}

  // MODAL
  function openModal(id){
    currentEditId=id||null;
    const personal=loadPersonal();
    const m=id?personal.find(x=>x.id===id):null;
    document.getElementById('modalTitle').textContent=id?'Editar Mapa Mental':'Adicionar Mapa Mental';
    document.getElementById('fNome').value=m?m.nome:'';
    document.getElementById('fArea').value=m?m.area:'Clínica Médica';
    document.getElementById('fSubarea').value=m?m.subarea||'':'';
    document.getElementById('fLink').value=m?m.link||'':'';
    document.getElementById('fNota').value=m?m.nota||'':'';
    document.getElementById('btnDel').style.display=id?'block':'none';
    document.getElementById('linkPreview').classList.remove('show');
    if(m&&m.link)previewLink();
    document.getElementById('modalOverlay').classList.add('active');
  }
  function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}
  function closeOnOverlay(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

  function previewLink(){
    const link=document.getElementById('fLink').value.trim();
    const thumb=getThumb(link);
    const preview=document.getElementById('linkPreview');
    if(thumb){
      document.getElementById('previewImg').src=thumb;
      preview.classList.add('show');
    } else {
      preview.classList.remove('show');
    }
  }

  function saveMapa(){
    const nome=document.getElementById('fNome').value.trim();
    if(!nome){showToast('⚠️ Nome obrigatório!');return;}
    const obj={
      id:currentEditId||'p'+Date.now(),
      nome,
      area:document.getElementById('fArea').value,
      subarea:document.getElementById('fSubarea').value.trim(),
      link:document.getElementById('fLink').value.trim(),
      nota:document.getElementById('fNota').value.trim(),
    };
    let personal=loadPersonal();
    if(currentEditId){personal=personal.map(m=>m.id===currentEditId?obj:m);showToast('✏️ Atualizado!');}
    else{personal.unshift(obj);showToast('✅ Mapa adicionado!');}
    savePersonal(personal);closeModal();render();
  }

  function deletePersonal(){
    if(!confirm('Remover este mapa?'))return;
    savePersonal(loadPersonal().filter(m=>m.id!==currentEditId));
    closeModal();render();showToast('🗑 Removido.');
  }

  function exportPersonal(){
    const p=loadPersonal();
    if(!p.length){showToast('⚠️ Nenhum mapa adicionado para exportar.');return;}
    const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`meus-mapas-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;a.click();
    URL.revokeObjectURL(url);showToast('💾 Exportado!');
  }

  function importPersonal(event){
    const file=event.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const imported=JSON.parse(e.target.result);
        if(!Array.isArray(imported))throw new Error();
        const ex=loadPersonal();const ids=new Set(ex.map(m=>m.id));
        savePersonal([...imported.filter(m=>!ids.has(m.id)),...ex]);
        render();showToast(`✅ Importado!`);
      }catch{showToast('❌ Arquivo inválido.');}
    };
    reader.readAsText(file);event.target.value='';
  }

  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
  }

  // Init — mostra Clínica Médica primeiro
  document.querySelector('.area-pill').click();
</script>
